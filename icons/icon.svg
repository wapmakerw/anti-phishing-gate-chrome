<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background shield gradient -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    
    <!-- Neon border gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Gloss highlight gradient -->
    <linearGradient id="glossGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Drop shadow filter for glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Shield Shape (Expanded to fill canvas with minimal 3px margin for stroke safety) -->
  <path d="M 64 3 L 125 15 L 125 70 C 125 102 96 122 64 125 C 32 122 3 102 3 70 L 3 15 Z"
        fill="url(#shieldGrad)" stroke="url(#borderGrad)" stroke-width="5"/>

  <!-- Gloss Highlight -->
  <path d="M 9 17 L 119 17 L 119 55 C 100 65 64 65 9 55 Z" fill="url(#glossGrad)"/>

  <!-- Centered glowing checkmark -->
  <path d="M 38 64 L 56 82 L 90 44" fill="none" stroke="#00f2fe" stroke-width="12" 
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.8"/>

  <!-- Centered checkmark inner core for sharpness -->
  <path d="M 38 64 L 56 82 L 90 44" fill="none" stroke="#ffffff" stroke-width="8" 
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
